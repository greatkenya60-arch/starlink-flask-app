<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succès - STARLINK RDC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }
        .checkmark {
            font-size: 100px;
            color: #28a745;          /* green */
            margin-bottom: 25px;
            line-height: 1;
        }
        h1 {
            color: #28a745;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }
        .btn-home {
            display: inline-block;
            padding: 16px 40px;
            background: #d32f2f;     /* your red theme */
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background: #b71c1c;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="checkmark">✓</div>
        <h1>Succès !</h1>
        <p>Votre paiement a été confirmé avec succès.<br>Merci pour votre renouvellement Starlink.</p>
        
        <a href="{{ url_for('index') }}" class="btn-home">
            Retour à l'accueil
        </a>
    </div>

</body>
</html>
